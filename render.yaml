# Render Blueprint — deploys the backend + frontend together as one stack.
# In Render: New → Blueprint → pick this repo. It reads this file and creates
# both services. You only fill in the secret values marked `sync: false`.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: receiptsys-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      # --- secrets: paste these in the Render dashboard ---
      - key: AI_API_KEY            # Anthropic Claude key (sk-ant-...)
        sync: false
      - key: OCR_OPENAI_API_KEY    # OpenAI key used for OCR (sk-proj-...)
        sync: false
      # --- non-secret defaults ---
      - key: AI_BASE_URL
        value: https://api.anthropic.com
      - key: AI_MODEL
        value: claude-sonnet-4-5
      - key: OCR_ENGINE
        value: openai
      - key: OCR_OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OCR_OPENAI_MODEL
        value: gpt-4o-mini

  - type: web
    name: receiptsys-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      # Backend public URL. We hard-code the full https:// URL instead of
      # `fromService property: host` because that property returns Render's
      # internal short name (e.g. `receiptsys-backend`), which only resolves
      # over Render's private network — DNS fails (ENOTFOUND) on the public
      # network the free tier uses.
      - key: PYTHON_BACKEND_URL
        value: https://receiptsys-backend.onrender.com
      # The access password testers must enter. Set this in the dashboard.
      - key: APP_PASSWORD
        sync: false
      # OCR fetch timeout. Long enough to absorb the free-tier backend's
      # ~50s cold-start spin-up (default 10s would fetch-fail every time).
      - key: OCR_HTTP_TIMEOUT_MS
        value: "180000"

  # English-locale frontend. Same codebase, LOCALE=en flips UI + AI prompts
  # + Excel headers to English. Shares the same Python backend.
  - type: web
    name: receiptsys-frontend-en
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: LOCALE
        value: en
      - key: PYTHON_BACKEND_URL
        value: https://receiptsys-backend.onrender.com
      - key: APP_PASSWORD
        sync: false      # separate password for the English link
      - key: OCR_HTTP_TIMEOUT_MS
        value: "180000"
